<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>My Todos</h1>
      <p class="subtitle">Stay organized, get things done</p>
    </header>

    <form id="todo-form" class="todo-form" autocomplete="off">
      <input
        id="todo-input"
        type="text"
        placeholder="What needs to be done?"
        maxlength="200"
        required
      />
      <button type="submit" class="btn btn-primary">Add</button>
    </form>

    <div class="toolbar">
      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>
      <span id="todo-count" class="todo-count">0 items left</span>
    </div>

    <ul id="todo-list" class="todo-list"></ul>

    <div id="empty-state" class="empty-state hidden">
      <div class="empty-icon">✓</div>
      <p>No todos yet. Add one above!</p>
    </div>

    <footer class="footer">
      <button id="clear-completed" class="btn btn-ghost" disabled>
        Clear completed
      </button>
    </footer>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
